spring.application.name=ai-web-scraper
spring.main.web-application-type=none

# --- Gmail SMTP ---
# Requires a Gmail App Password (not your regular password):
#   myaccount.google.com → Security → 2-Step Verification → App passwords
# Then run: export MAIL_PASSWORD=xxxx-xxxx-xxxx-xxxx
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# --- Local testing with Mailpit (docker compose up -d → http://localhost:8025) ---
# spring.mail.host=localhost
# spring.mail.port=1025

# --- Email digest ---
app.email.from=${MAIL_USERNAME}
app.email.recipients=${MAIL_RECIPIENTS}
app.email.subject=Daily AI News Digest

# --- News settings ---
app.news.max-items=20
# To add custom RSS feeds (comma-separated), uncomment:
# app.news.rss-feeds=https://your-feed.com/rss,https://another-feed.com/feed

# --- Run on startup ---
app.run-on-startup=true

# --- Schedule (runs daily at 08:00 if app stays running) ---
app.schedule.cron=0 0 8 * * *

# --- Spring AI (Anthropic / Claude) ---
# Set ANTHROPIC_API_KEY before running: export ANTHROPIC_API_KEY=sk-ant-...
# If not set, the app falls back to recency-sorted items without AI summaries.
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:not-set}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5-20251001
spring.ai.anthropic.chat.options.max-tokens=4096

# --- Valkey / Redis cache ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
app.cache.ttl-hours=72

# --- Logging ---
logging.level.com.aiwebscraper=INFO
