<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AI News Digest</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 24px 16px;
            color: #1a1a1a;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }
        .header {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #ffffff;
            padding: 36px 32px;
            text-align: center;
        }
        .header h1 {
            margin: 0 0 8px;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .header .subtitle {
            margin: 0;
            font-size: 13px;
            opacity: 0.65;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .content {
            padding: 8px 0;
        }
        .item {
            padding: 24px 32px;
            border-bottom: 1px solid #f0f0f0;
        }
        .item:last-child {
            border-bottom: none;
        }
        .item-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .source-badge {
            display: inline-block;
            background: #eef2ff;
            color: #4f46e5;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .significance-badge {
            display: inline-block;
            background: #fef3c7;
            color: #92400e;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .item-title {
            margin: 0 0 10px;
            font-size: 17px;
            font-weight: 600;
            line-height: 1.4;
        }
        .item-title a {
            color: #111827;
            text-decoration: none;
        }
        .item-title a:hover {
            color: #4f46e5;
        }
        .item-summary {
            margin: 0;
            font-size: 14px;
            color: #4b5563;
            line-height: 1.65;
        }
        .empty {
            padding: 48px 32px;
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
        }
        .footer {
            background: #f9fafb;
            padding: 20px 32px;
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            border-top: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>AI News Digest</h1>
        <p class="subtitle" th:text="'Curated by Claude · ' + ${date}">Curated by Claude · Date</p>
    </div>

    <div class="content">
        <div th:if="${#lists.isEmpty(items)}" class="empty">
            No AI news found in the last 24 hours.
        </div>

        <div th:each="item : ${items}" class="item">
            <div class="item-meta">
                <span class="source-badge" th:text="${item.source()}">Source</span>
                <span class="significance-badge"
                      th:if="${item.significance() != null and !item.significance().isEmpty()}"
                      th:text="${item.significance()}">Significance</span>
            </div>
            <h2 class="item-title">
                <a th:href="${item.url()}" th:text="${item.title()}">Title</a>
            </h2>
            <p class="item-summary"
               th:if="${item.aiSummary() != null and !item.aiSummary().isEmpty()}"
               th:text="${item.aiSummary()}">Summary</p>
        </div>
    </div>

    <div class="footer">
        AI Web Scraper &bull; Sources: Hacker News &bull; Reddit &bull; TechCrunch &bull; The Verge &bull; VentureBeat &bull; MIT Technology Review
    </div>
</div>
</body>
</html>
